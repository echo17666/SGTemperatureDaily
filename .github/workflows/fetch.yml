name: Fetch Temperature

on:
  schedule:
    # Every 2 minutes from 02:00-10:00 UTC = 10:00-18:00 UTC+8
    - cron: '*/2 2-10 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch temperature and update chart
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python scripts/fetch_temp.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ chart.svg README.md
          git diff --staged --quiet || git commit -m "data: $(TZ='Asia/Singapore' date +'%Y-%m-%d %H:%M')"
          git push
